# 生产环境配置
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/soulcurator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
  
  # 生产环境优化
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate  # 生产环境使用validate
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 5000ms

# 生产环境安全配置
security:
  enabled: true

# 生产环境日志
logging:
  level:
    com.soulcurator.backend: INFO
    org.springframework: WARN
    org.hibernate: WARN
  file:
    name: logs/soul-curator.log
    max-size: 10MB
    max-history: 30
  
# 生产服务器配置
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-stacktrace: never