spring:
  application:
    name: soul-curator-simple
  
  datasource:
    url: jdbc:postgresql://localhost:5432/soulcurator
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  # servlet:
  #   context-path: /api

logging:
  level:
    com.soulcurator.backend: DEBUG
    org.springframework.web: INFO
