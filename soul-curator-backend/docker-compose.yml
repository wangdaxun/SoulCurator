version: '3.8'

services:
  postgres:
    image: postgres:14-alpine  # 降级到14版本，兼容旧版Navicat
    container_name: soulcurator-postgres
    environment:
      POSTGRES_DB: soulcurator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soulcurator-network

  redis:
    image: redis:7-alpine
    container_name: soulcurator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soulcurator-network

networks:
  soulcurator-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: